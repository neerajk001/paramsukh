name: Deploy Backend and Admin

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: saas-native-backend
  ADMIN_IMAGE_NAME: saas-native-admin

jobs:
  build-and-push:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ steps.export.outputs.backend_image }}
      admin_image: ${{ steps.export.outputs.admin_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.BACKEND_IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}

      - name: Build and push admin image
        uses: docker/build-push-action@v6
        with:
          context: ./admin
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.ADMIN_IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.ADMIN_IMAGE_NAME }}:${{ github.sha }}

      - name: Export image names
        id: export
        run: |
          echo "backend_image=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "admin_image=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.ADMIN_IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy on VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
    steps:
      - name: Deploy stack over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_PROJECT_PATH }}"
            git pull --ff-only

            # Validate critical backend env values before attempting restart
            for key in MONGO_URI JWT_SECRET ADMIN_API_KEY; do
              if ! grep -Eq "^${key}=.+" backend/.env; then
                echo "FATAL: Missing required ${key} in backend/.env"
                exit 1
              fi
            done
            if ! grep -Eq '^NEXT_PUBLIC_ADMIN_API_KEY=.+' .env; then
              echo "FATAL: Missing required NEXT_PUBLIC_ADMIN_API_KEY in .env"
              exit 1
            fi
            if grep -Eq '^JWT_SECRET=(your_jwt_secret_key|your_jwt_secret_key_here|your_super_secret_jwt_key_change_this_in_production)?$' backend/.env; then
              echo "FATAL: backend/.env has a placeholder or empty JWT_SECRET"
              exit 1
            fi
            if grep -Eq '^ADMIN_API_KEY=(dev-admin-key-123)?$' backend/.env; then
              echo "FATAL: backend/.env has a placeholder or empty ADMIN_API_KEY"
              exit 1
            fi
            if grep -Eq '^NEXT_PUBLIC_ADMIN_API_KEY=(dev-admin-key-123)?$' .env; then
              echo "FATAL: .env has a placeholder or empty NEXT_PUBLIC_ADMIN_API_KEY"
              exit 1
            fi

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            BACKEND_IMAGE="${{ needs.build-and-push.outputs.backend_image }}" ADMIN_IMAGE="${{ needs.build-and-push.outputs.admin_image }}" docker compose pull backend
            BACKEND_IMAGE="${{ needs.build-and-push.outputs.backend_image }}" ADMIN_IMAGE="${{ needs.build-and-push.outputs.admin_image }}" docker compose build --no-cache admin

            if ! BACKEND_IMAGE="${{ needs.build-and-push.outputs.backend_image }}" ADMIN_IMAGE="${{ needs.build-and-push.outputs.admin_image }}" docker compose up -d backend admin; then
              echo "docker compose up failed; dumping backend/admin logs"
              docker compose logs --no-color --tail=200 backend admin || true
              exit 1
            fi

            backend_container="$(docker compose ps -q backend)"
            if [ -z "$backend_container" ]; then
              echo "FATAL: backend container id not found after compose up"
              docker compose ps
              docker compose logs --no-color --tail=200 backend || true
              exit 1
            fi

            backend_status="starting"
            for i in $(seq 1 24); do
              backend_status="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}' "$backend_container")"
              if [ "$backend_status" = "healthy" ]; then
                echo "Backend is healthy"
                break
              fi
              if [ "$backend_status" = "unhealthy" ]; then
                echo "Backend became unhealthy; dumping logs"
                docker compose logs --no-color --tail=200 backend || true
                exit 1
              fi
              sleep 5
            done

            if [ "$backend_status" != "healthy" ]; then
              echo "FATAL: backend did not become healthy in time (status: $backend_status)"
              docker compose logs --no-color --tail=200 backend || true
              exit 1
            fi

            docker compose ps
